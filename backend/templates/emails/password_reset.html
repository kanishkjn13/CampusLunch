<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
</head>

<body
    style="font-family:Arial,sans-serif;background:#f4f4f4;padding:40px;">

    <table
        style="max-width:600px;background:white;margin:auto;padding:30px;border-radius:10px;">

        <tr>
            <td>

                <h2 style="color:#0d6efd;">
                    CampusLunch
                </h2>

                <h3>
                    Reset Your Password
                </h3>

                <p>
                    Hello <b>{{ full_name }}</b>,
                </p>

                <p>
                    We received a request to reset your CampusLunch password.
                </p>

                <p>
                    Click the button below.
                </p>

                <a href="{{ reset_link }}"
                    style="
                        background:#0d6efd;
                        color:white;
                        padding:12px 25px;
                        text-decoration:none;
                        border-radius:6px;
                        display:inline-block;
                    ">
                    Reset Password
                </a>

                <br><br>

                <p>
                    Or copy this link:
                </p>

                <p>

                    {{ reset_link }}

                </p>

                <hr>

                <small>

                    If you didn't request this password reset,
                    simply ignore this email.

                </small>

                <br><br>

                <b>
                    CampusLunch Team
                </b>

            </td>
        </tr>

    </table>

</body>

</html>
